disableStartupPopups: true
notARepository: 'skip'
promptToReturnFromSubprocess: false

gui:
  nerdFontsVersion: '3'
  showRandomTip: false
  showFileTree: true
  showFileIcons: false
  showBottomLine: false
  theme:
    activeBorderColor:
      - '#fabd2f'
      - bold
    inactiveBorderColor:
      - '#928374'
    optionsTextColor:
      - '#83a598'
    selectedLineBgColor:
      - '#3c3836'
    selectedRangeBgColor:
      - '#3c3836'
    cherryPickedCommitBgColor:
      - '#504945'
    cherryPickedCommitFgColor:
      - '#fabd2f'
    unstagedChangesColor:
      - '#fb4934'
    defaultFgColor:
      - '#ebdbb2'

os:
  editPreset: 'nvim'

git:
  disableForcePushing: true
  autoForwardBranches: none
  commit:
    verbose: true
  log:
    showGraph: always
  branchLogCmd: "git log --graph --color=always --oneline --decorate {{branchName}} --"
  pagers:
    - colorArg: always
      pager: mise exec -- delta --paging=never --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
